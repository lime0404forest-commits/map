<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEIN World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; background: #0d0d0d; color: #fff; font-family: system-ui, sans-serif; }
        #map-container { position: relative; width: 100%; height: 100%; min-height: 420px; }
        #game-map { width: 100%; height: 100%; min-height: 420px; background: #0d0d0d; }
        .emoji-icon div {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.8));
            cursor: pointer;
        }
        #game-map.zoom-level-0 .emoji-icon div { font-size: 10px !important; }
        #game-map.zoom-level-1 .emoji-icon div { font-size: 11px !important; }
        #game-map.zoom-level-2 .emoji-icon div { font-size: 13px !important; }
        #game-map.zoom-level-3 .emoji-icon div { font-size: 17px !important; }
        #game-map.zoom-level-4 .emoji-icon div { font-size: 21px !important; }
        #game-map.zoom-level-5 .emoji-icon div { font-size: 24px !important; }
        .item-tooltip {
            background: rgba(0, 0, 0, 0.85) !important; border: 1px solid #777 !important; color: #fff !important;
            font-weight: bold !important; padding: 4px 8px !important; border-radius: 4px !important;
            font-size: 12px !important; white-space: nowrap; box-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }
        .demo-svg-inner { filter: drop-shadow(0 0 2px rgba(0,0,0,0.85)); }
        .map-pin-leaflet-shell { background: transparent !important; border: none !important; }
        .map-pin-svg-composite { background: transparent !important; border: none !important; }
        .map-pin-svg-composite.demo-pin-zoom-adapt {
            transform-origin: 50% 100%;
            transition: transform 0.12s ease-out;
        }
        #game-map.zoom-level-0 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.22); }
        #game-map.zoom-level-1 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.28); }
        #game-map.zoom-level-2 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.38); }
        #game-map.zoom-level-3 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.54); }
        #game-map.zoom-level-4 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.72); }
        #game-map.zoom-level-5 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.88); }
        .map-pin-icon-only { background: transparent !important; border: none !important; }
        .map-pin-icon-only-img {
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 6px rgba(0, 0, 0, 0.4)) !important;
            -webkit-filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 6px rgba(0, 0, 0, 0.4)) !important;
        }
        .map-pin-icon-only.demo-pin-zoom-adapt {
            transform-origin: 50% 50%;
            transition: transform 0.12s ease-out;
        }
        #game-map.zoom-level-0 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.22); }
        #game-map.zoom-level-1 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.28); }
        #game-map.zoom-level-2 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.38); }
        #game-map.zoom-level-3 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.54); }
        #game-map.zoom-level-4 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.72); }
        #game-map.zoom-level-5 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.88); }
        .demo-pin-icon-img {
            width: 24px !important; height: 24px !important; max-width: 24px !important; max-height: 24px !important;
            object-fit: contain !important; box-sizing: border-box !important;
            filter: drop-shadow(0 0 1px rgba(0,0,0,0.6));
        }
    </style>
</head>
<body>
    <div id="map-container">
        <!--
          マップアセットのベース（この HTML と同じフォルダに map.js / tiles / csv 等を置く想定）
          パスを変えたら下の絶対URLをすべて合わせること。
        -->
        <div id="game-map"
             data-zoom="2"
             data-show-all-pins="true"
             data-pins="https://lost-in-games.com/test-vein-map/pins_export.json"
             data-svg-icons-common-base="https://lost-in-games.com/test-vein-map/assets/icons/"
             data-demo-pin-marker-size="56"
             style="width:100%;height:100%;"></div>
    </div>
    <!-- map.js の URL で baseUrl が決まる（CSV・タイル・areas.json は同ディレクトリ相対） -->
    <script src="https://lost-in-games.com/test-vein-map/map.js"></script>
</body>
</html>
