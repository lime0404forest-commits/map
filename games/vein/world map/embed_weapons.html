<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEIN World Map (Weapons Subset)</title>
</head>
<body style="margin:0;background:#0d0d0d;color:#fff;">
<!--
  武器デチューン版（同一DB共用）
  - map.js / config.json / master_data.csv は通常版と同じ
  - #game-map の data-view-preset="weapons" だけ変更
  - 言語は ?lang=ja / ?lang=en で切替
-->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
    html { height: 100%; }
    body {
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
    }
    .vein-map-embed-root {
        box-sizing: border-box;
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
        min-height: 100%;
        display: flex;
        flex-direction: column;
    }
    .vein-map-embed-root * { box-sizing: border-box; }
    .vein-map-embed-root #map-container {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        width: 100%;
        border: 1px solid #333;
        overflow: hidden;
    }
    .vein-map-embed-root #game-map {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        height: auto;
        background: #0d0d0d;
    }
    .vein-map-embed-root #game-map .leaflet-container {
        width: 100% !important;
        height: 100% !important;
        background: #0d0d0d;
    }
    .vein-map-embed-root .emoji-icon div {
        display: flex; justify-content: center; align-items: center;
        width: 100%; height: 100%;
        filter: drop-shadow(0 0 2px rgba(0,0,0,0.8));
        cursor: pointer;
    }
    .vein-map-embed-root #game-map.zoom-level-0 .emoji-icon div { font-size: 10px !important; }
    .vein-map-embed-root #game-map.zoom-level-1 .emoji-icon div { font-size: 11px !important; }
    .vein-map-embed-root #game-map.zoom-level-2 .emoji-icon div { font-size: 13px !important; }
    .vein-map-embed-root #game-map.zoom-level-3 .emoji-icon div { font-size: 17px !important; }
    .vein-map-embed-root #game-map.zoom-level-4 .emoji-icon div { font-size: 21px !important; }
    .vein-map-embed-root #game-map.zoom-level-5 .emoji-icon div { font-size: 24px !important; }
    .vein-map-embed-root #game-map.zoom-level-6 .emoji-icon div { font-size: 26px !important; }
    .vein-map-embed-root .item-tooltip {
        background: rgba(0, 0, 0, 0.85) !important; border: 1px solid #777 !important; color: #fff !important;
        font-weight: bold !important; padding: 4px 8px !important; border-radius: 4px !important;
        font-size: 12px !important; white-space: nowrap; box-shadow: 2px 2px 6px rgba(0,0,0,0.5);
    }
    .vein-map-embed-root .demo-svg-inner { filter: drop-shadow(0 0 2px rgba(0,0,0,0.85)); }
    .vein-map-embed-root .map-pin-leaflet-shell { background: transparent !important; border: none !important; }
    .vein-map-embed-root .map-pin-svg-composite { background: transparent !important; border: none !important; }
    .vein-map-embed-root .map-pin-svg-composite.demo-pin-zoom-adapt {
        transform-origin: 50% 100%;
        transition: transform 0.12s ease-out;
    }
    .vein-map-embed-root #game-map.zoom-level-0 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.22); }
    .vein-map-embed-root #game-map.zoom-level-1 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.28); }
    .vein-map-embed-root #game-map.zoom-level-2 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.38); }
    .vein-map-embed-root #game-map.zoom-level-3 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.54); }
    .vein-map-embed-root #game-map.zoom-level-4 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.72); }
    .vein-map-embed-root #game-map.zoom-level-5 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.88); }
    .vein-map-embed-root #game-map.zoom-level-6 .map-pin-svg-composite.demo-pin-zoom-adapt { transform: scale(0.94); }
    .vein-map-embed-root .map-pin-icon-only { background: transparent !important; border: none !important; }
    .vein-map-embed-root .map-pin-icon-only-img {
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 6px rgba(0, 0, 0, 0.4)) !important;
        -webkit-filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 6px rgba(0, 0, 0, 0.4)) !important;
    }
    .vein-map-embed-root .map-pin-icon-only.demo-pin-zoom-adapt {
        transform-origin: 50% 50%;
        transition: transform 0.12s ease-out;
    }
    .vein-map-embed-root #game-map.zoom-level-0 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.22); }
    .vein-map-embed-root #game-map.zoom-level-1 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.28); }
    .vein-map-embed-root #game-map.zoom-level-2 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.38); }
    .vein-map-embed-root #game-map.zoom-level-3 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.54); }
    .vein-map-embed-root #game-map.zoom-level-4 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.72); }
    .vein-map-embed-root #game-map.zoom-level-5 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.88); }
    .vein-map-embed-root #game-map.zoom-level-6 .map-pin-icon-only.demo-pin-zoom-adapt { transform: scale(0.94); }
    .vein-map-embed-root .demo-pin-icon-img {
        width: 24px !important; height: 24px !important; max-width: 24px !important; max-height: 24px !important;
        object-fit: contain !important; box-sizing: border-box !important;
        filter: drop-shadow(0 0 1px rgba(0,0,0,0.6));
    }
</style>
<div class="vein-map-embed-root">
    <div id="map-container">
        <div id="game-map"
             data-zoom="3"
             data-center-x="2200"
             data-center-y="3300"
             data-view-preset="weapons"
             data-importance-visual="off"
             data-show-all-pins="true"
             data-demo-pin-marker-size="32"
             style="width:100%;min-height:0;flex:1 1 auto;"></div>
    </div>
</div>
<script src="map.js?v=vein-filter-hierarchy"></script>
</body>
</html>
